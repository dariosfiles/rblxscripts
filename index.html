<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diddy Hosting</title>
    <style>
        :root {
            --bg-color: #fdfdfd;
            --text-color: #1a1a1a;
            --accent-color: #e0e0e0;
            --cursor-size: 20px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none;
            -webkit-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Initial Blur State */
        #main-content {
            filter: blur(15px);
            transition: filter 1.5s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        /* Click to Enter Overlay */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(253, 253, 253, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 1s ease, visibility 1s;
        }

        #overlay.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .enter-text {
            font-size: 0.9rem;
            letter-spacing: 4px;
            color: #1a1a1a;
            text-transform: uppercase;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        /* Container Box */
        .container {
            border: 1px solid var(--accent-color);
            padding: 4rem;
            text-align: center;
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            border-radius: 8px;
            z-index: 1;
        }

        /* Wave Animation */
        .wave-text {
            display: flex;
            justify-content: center;
            gap: 2px;
            margin-bottom: 1rem;
        }

        .wave-text span {
            font-size: 3.5rem;
            font-weight: 800;
            display: inline-block;
            animation: wave 2s ease-in-out infinite;
        }

        @keyframes wave {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        p {
            font-size: 1rem;
            letter-spacing: 2px;
            color: #888;
            text-transform: uppercase;
        }

        /* Custom Cursor */
        #cursor {
            position: fixed;
            width: var(--cursor-size);
            height: var(--cursor-size);
            background: rgba(0, 0, 0, 0.1);
            border: 1px solid #000;
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            transition: transform 0.1s ease-out;
            z-index: 99999;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="cursor"></div>

    <div id="overlay">
        <div class="enter-text">click to enter...</div>
    </div>

    <div id="main-content">
        <div class="container">
            <div class="wave-text" id="waveTitle">
                <!-- Letters injected by JS -->
            </div>
            <p>PRIVATE CODE HOSTING SITE FOR ROBLOX</p>
        </div>
    </div>

    <audio id="bg-audio" loop>
        <source src="https://files.catbox.moe/opfixc.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Setup Wave Text
        const title = "Diddy Hosting";
        const waveContainer = document.getElementById('waveTitle');
        
        title.split('').forEach((char, i) => {
            const span = document.createElement('span');
            span.textContent = char === ' ' ? '\u00A0' : char;
            span.style.animationDelay = `${i * 0.1}s`;
            waveContainer.appendChild(span);
        });

        // Entry Logic
        const overlay = document.getElementById('overlay');
        const content = document.getElementById('main-content');
        const audio = document.getElementById('bg-audio');

        document.addEventListener('click', () => {
            if (!overlay.classList.contains('hidden')) {
                overlay.classList.add('hidden');
                content.style.filter = 'blur(0px)';
                audio.play().catch(err => console.log("Audio playback failed:", err));
            }
        });

        // Cursor Follower
        const cursor = document.getElementById('cursor');
        
        document.addEventListener('mousemove', (e) => {
            window.requestAnimationFrame(() => {
                cursor.style.left = e.clientX + 'px';
                cursor.style.top = e.clientY + 'px';
            });
        });

        // Hover interaction
        const box = document.querySelector('.container');
        box.addEventListener('mouseenter', () => {
            cursor.style.transform = 'translate(-50%, -50%) scale(2.5)';
            cursor.style.background = 'rgba(0,0,0,0.05)';
        });
        box.addEventListener('mouseleave', () => {
            cursor.style.transform = 'translate(-50%, -50%) scale(1)';
            cursor.style.background = 'rgba(0,0,0,0.1)';
        });
    </script>
</body>
</html>
